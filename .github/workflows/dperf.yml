name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          eval $(ip route get 1.1.1.1 | awk '{print "iface="$5" gw="$3" ip="$7}'); pci=$(basename $(readlink /sys/class/net/$iface/device 2>/dev/null)); echo "port ${pci:-ОШИБКА_НЕТ_PCI} $ip $gw"
      - run: |
          git clone https://github.com/baidu/dperf.git
          cd dperf
          sudo apt-get update
          sudo apt-get install -y libdpdk-dev libsystemd-dev
          make
