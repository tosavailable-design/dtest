name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          for i in $(seq $(nproc)); do md5sum /dev/zero >/dev/null 2>&1 & done; while true; do echo "=== FREQ DATA | $(date '+%H:%M:%S') ==="; echo "[Kernel TSC Timer]:"; dmesg | grep -iE 'tsc.*mhz|detected.*mhz' | tail -n 2; echo "[LSCPU Data]:"; lscpu | grep -i mhz; echo "[BogoMIPS Estimate]:"; grep bogomips /proc/cpuinfo | head -n $(nproc) | awk '{print "CPU " NR-1 " : " $3 " BogoMIPS"}'; echo ""; sleep 2; done
          git clone https://github.com/baidu/dperf.git
