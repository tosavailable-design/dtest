name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          IFACE=$(ip route get 1.1.1.1 | grep -oP 'dev \K\S+'); IP=$(ip route get 1.1.1.1 | grep -oP 'src \K\S+'); GW=$(ip -4 route get 1.1.1.1 | grep -oP 'via \K\S+'); [ -z "$GW" ] && GW=$(ip -4 route show default | grep -oP 'via \K\S+' | head -n1); PCI=$(readlink /sys/class/net/$IFACE/device 2>/dev/null); PCI=${PCI##*/}; echo "port ${PCI:-ОШИБКА_НЕТ_PCI} $IP ${GW:-НЕТ_ШЛЮЗА}"
      - run: |
          git clone https://github.com/baidu/dperf.git
          cd dperf
          sudo apt-get update
          sudo apt-get install -y libdpdk-dev libsystemd-dev
          make
