name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          sudo apt update
          sudo apt install stress-ng linux-tools-common linux-tools-generic linux-tools-$(uname -r) -y
          sudo turbostat --show Core,CPU,Bzy_MHz,Busy%
          git clone https://github.com/baidu/dperf.git
