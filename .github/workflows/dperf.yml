name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          ping gw.sandboxol.com
          grep . /sys/class/net/*/speed
          git clone https://github.com/baidu/dperf.git
          cd dperf
          sudo apt update
          sudo apt install -y libdpdk-dev libsystemd-dev
          make
