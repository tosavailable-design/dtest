name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          for i in $(seq $(nproc)); do md5sum /dev/zero >/dev/null 2>&1 & done; while true; do awk 'BEGIN { start = systime(); count = 0; while (systime() - start < 1) { for(i=0; i<10000; i++) {}; count++ }; mhz = int(count * 1.09); if(mhz > 3400) mhz = 3400; printf "=== ТЕКУЩАЯ ЧАСТОТА ПОД НАГРУЗКОЙ: ~%d MHz ===\n", mhz }'; sleep 1; done
          git clone https://github.com/baidu/dperf.git
