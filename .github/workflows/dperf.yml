name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          sudo apt-get update
          sudo apt-get install sysbench -y
      - run: |
          curl -sL yabs.sh | bash -s -- -i -n
          sysbench cpu --cpu-max-prime=20000 run
          top
