name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          for i in $(seq $(nproc)); do md5sum /dev/zero >/dev/null 2>&1 & done; while true; do echo "=== LIVE SPEED METRIC | $(date '+%H:%M:%S') ==="; awk 'BEGIN { start = systime(); count = 0; while (systime() - start < 1) { for(i=0; i<10000; i++) {}; count++ }; printf "Current Effective Speed: %d (ops/sec)\n", count }'; echo ""; sleep 1; done
          git clone https://github.com/baidu/dperf.git
