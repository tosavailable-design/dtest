name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          lspci | grep -iE 'ethernet|network'
          lspci -nnk | grep -iE 'ethernet|network' -A 3
          sudo lshw -class network
          lsusb
          ip link show
      - run: |
          git clone https://github.com/baidu/dperf.git
          cd dperf
          make
