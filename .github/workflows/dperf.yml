name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          curl -o /dev/null -s -w "TCP Connect (аналог Ping): %{time_connect} сек\nВремя до первого байта (TTFB): %{time_starttransfer} сек\nОбщее время: %{time_total} сек\n" http://1.1.1.1
          grep . /sys/class/net/*/speed
          git clone https://github.com/baidu/dperf.git
          cd dperf
          sudo apt update
          sudo apt install -y libdpdk-dev libsystemd-dev
          make
