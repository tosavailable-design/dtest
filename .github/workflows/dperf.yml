name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          for i in $(seq $(nproc)); do md5sum /dev/zero >/dev/null 2>&1 & done; while true; do echo "=== 100% LOAD | $(date '+%H:%M:%S') ==="; grep 'cpu MHz' /proc/cpuinfo | awk '{printf "CPU %02d : %8s MHz\n", NR-1, $4}'; echo ""; sleep 1; done
          git clone https://github.com/baidu/dperf.git
