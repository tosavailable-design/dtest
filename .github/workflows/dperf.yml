name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          curl -o /dev/null -s -w "HTTP Статус: %{http_code}\nTCP Connect (Пинг): %{time_connect} сек\nВремя до первого байта: %{time_starttransfer} сек\nОбщее время: %{time_total} сек\n" http://ftp.de.debian.org/debian/
          curl -o /dev/null -s -w "HTTP Статус: %{http_code}\nTCP Connect (Пинг): %{time_connect} сек\nВремя до первого байта: %{time_starttransfer} сек\nОбщее время: %{time_total} сек\n" http://ftp.fr.debian.org/debian/
          git clone https://github.com/baidu/dperf.git
          cd dperf
          sudo apt update
          sudo apt install -y libdpdk-dev libsystemd-dev
          make
